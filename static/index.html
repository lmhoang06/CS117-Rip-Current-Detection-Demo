<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CBAM YOLO demo</title>
  <style>
    :root {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
    }
    body { max-width: 800px; margin: 0 auto; padding: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 600; }
    .row { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; margin-top: 1rem; }
    .panel { flex: 1 1 100%; }
    video { width: 100%; background: #000; border-radius: 6px; }
    label { display: block; margin-bottom: 0.35rem; font-size: 0.9rem; color: #bbb; }
    button {
      margin-top: 0.75rem;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: none;
      background: #3b82f6;
      color: #fff;
      cursor: pointer;
      font-weight: 500;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 0.75rem; font-size: 0.9rem; color: #9ca3af; min-height: 1.25rem; }
    #error { color: #f87171; margin-top: 0.5rem; }
    .legend { font-size: 0.85rem; color: #9ca3af; margin-top: 0.35rem; }
  </style>
</head>
<body>
  <h1>CBAM YOLO segmentation demo</h1>
  <p class="legend">Upload a video. The server renders the MP4 with YOLO26n + CBAM overlay (green).</p>

  <div>
    <label for="video">Video file</label>
    <input id="video" type="file" accept="video/*" />
  </div>
  <button id="go" type="button">Render video</button>
  
  <div style="margin-top: 1.5rem; border-top: 1px solid #333; padding-top: 1rem;">
    <label for="cache-select">Or choose a pre-loaded / cached video</label>
    <div style="display: flex; gap: 0.5rem; align-items: center; margin-top: 0.35rem;">
      <select id="cache-select" style="background: #222; color: #eee; padding: 0.5rem; border-radius: 6px; border: 1px solid #444; flex-grow: 1; max-width: 400px;">
        <option value="">-- No cached videos --</option>
      </select>
      <button id="refresh-cache" type="button" style="background: #4b5563; margin-top: 0; padding: 0.5rem 1rem;">Refresh</button>
    </div>
  </div>

  <div id="status"></div>
  <div id="error"></div>

  <div class="row">
    <div class="panel">
      <label>YOLO26n + CBAM</label>
      <video id="v" controls playsinline></video>
    </div>
  </div>

  <script>
    const $video = document.getElementById("video");
    const $go = document.getElementById("go");
    const $status = document.getElementById("status");
    const $error = document.getElementById("error");
    const $v = document.getElementById("v");
    const $cacheSelect = document.getElementById("cache-select");
    const $refreshCache = document.getElementById("refresh-cache");

    let pollTimer = null;

    function clearPoll() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    async function pollJob(jobId) {
      const res = await fetch(`/api/jobs/${jobId}`);
      if (!res.ok) {
        const t = await res.text();
        throw new Error(t || res.statusText);
      }
      return res.json();
    }

    async function loadCacheList() {
      try {
        const res = await fetch("/api/cache");
        if (!res.ok) return;
        const list = await res.json();
        $cacheSelect.innerHTML = "";
        
        if (list.length === 0) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "-- No cached videos --";
          $cacheSelect.appendChild(opt);
          return;
        }

        const optDefault = document.createElement("option");
        optDefault.value = "";
        optDefault.textContent = "-- Select a cached video --";
        $cacheSelect.appendChild(optDefault);

        for (const item of list) {
          const opt = document.createElement("option");
          opt.value = item.url;
          opt.textContent = item.name;
          $cacheSelect.appendChild(opt);
        }
      } catch (e) {
        console.error("Failed to load cache list:", e);
      }
    }

    $cacheSelect.addEventListener("change", () => {
      const url = $cacheSelect.value;
      if (url) {
        clearPoll();
        $status.textContent = "";
        $error.textContent = "";
        $v.src = url;
        $v.load();
        $v.play().catch(() => {});
      }
    });

    $refreshCache.addEventListener("click", loadCacheList);

    // Initial load
    loadCacheList();

    $go.addEventListener("click", async () => {
      clearPoll();
      $error.textContent = "";
      $v.removeAttribute("src");
      $v.load();

      const file = $video.files && $video.files[0];
      if (!file) {
        $error.textContent = "Choose a video file first.";
        return;
      }

      $go.disabled = true;
      $status.textContent = "Uploading…";

      const fd = new FormData();
      fd.append("video", file);

      try {
        const r = await fetch("/api/render", { method: "POST", body: fd });
        if (!r.ok) {
          const t = await r.text();
          throw new Error(t || r.statusText);
        }
        const { job_id: jobId } = await r.json();
        $status.textContent = "Queued…";

        pollTimer = setInterval(async () => {
          try {
            const j = await pollJob(jobId);
            if (j.progress && typeof j.progress.current === "number") {
              const t = j.progress.total != null ? ` / ${j.progress.total}` : "";
              $status.textContent = `Rendering… frame ${j.progress.current}${t}`;
            }
            if (j.status === "done" && j.urls) {
              clearPoll();
              $v.src = j.urls.url;
              $v.load();
              $status.textContent = "Done.";
              $go.disabled = false;
              loadCacheList(); // Refresh cache list to include new video
            }
            if (j.status === "error") {
              clearPoll();
              $error.textContent = j.error || "Render failed.";
              $status.textContent = "";
              $go.disabled = false;
            }
          } catch (e) {
            clearPoll();
            $error.textContent = String(e.message || e);
            $go.disabled = false;
          }
        }, 800);
      } catch (e) {
        $error.textContent = String(e.message || e);
        $status.textContent = "";
        $go.disabled = false;
      }
    });
  </script>
</body>
</html>
